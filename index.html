<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Oil Prices Dashboard</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    header h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 600;
    }

    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    /* HERO */
    .hero {
      max-width: 900px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    .swiper {
      border-radius: 14px;
      overflow: hidden;
    }

    .swiper img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    /* DASHBOARD */
    .dashboard {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card h2 {
      margin-bottom: 16px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    td {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    td:last-child {
      text-align: right;
      color: var(--muted);
    }

    /* CHART */
    canvas {
      margin-top: 10px;
    }

    .placeholder {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .swiper img {
        height: 220px;
      }

      header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Global Oil Prices</h1>
    <p>Live data • Trends • Insights</p>
  </header>

  <!-- HERO SLIDER -->
  <section class="hero">
    <!-- PRICE CARD -->
  <div class="price-overlay">
    <p class="label">Today’s Price</p>
    <h2 id="todayPrice">$--</h2>
  </div>
    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="images/oil1.jpg"></div>
        <div class="swiper-slide"><img src="images/oil2.jpg"></div>
        <div class="swiper-slide"><img src="images/oil3.jpg"></div>
        <div class="swiper-slide"><img src="images/oil4.jpg"></div>
      </div>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section class="dashboard">

    <div class="card">
      <h2>Today's Prices</h2>
      <table id="oilTable"></table>
    </div>

    <div class="card">
      <h2>Price Distribution</h2>
      <canvas id="oilChart"></canvas>
    </div>

    <div class="card">
      <h2>Predictions</h2>
      <div class="placeholder">
        Coming soon — AI-based predictions
      </div>
    </div>

  </section>

  <footer>
    Built with AWS • S3 • Lambda • EventBridge
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    new Swiper('.swiper', {
      loop: true,
      autoplay: { delay: 3000 },
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Oil Prices Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>US Oil Prices</h1>
    <p>Live data • Weekly trends</p>
  </header>

  <main>
    <!-- Today's Prices Table -->
    <section class="card">
      <h2>Today's Prices</h2>
      <table id="currentPricesTable">
        <thead>
          <tr>
            <th>State</th>
            <th>Price (USD)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Weekly Chart -->
    <section class="card">
      <h2>Last Week Prices</h2>
      <canvas id="historicalChart" height="150"></canvas>
    </section>
  </main>

  <footer>
    Built with AWS S3 • Lambda • EventBridge
  </footer>

  <script src="script.js"></script>
</body>
</html>

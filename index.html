<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Prices Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Oil Prices</h1>
    <p>Live global snapshot</p>
  </header>

  <!-- TOP METRIC -->
  <section class="top">
    <div class="price-card">
      <p>Today</p>
      <h2 id="todayPrice">$--</h2>
    </div>
  </section>

  <!-- MAIN DASHBOARD -->
  <section class="dashboard">
    
  <div class="card">
    <h3>Today's Prices</h3>
    <canvas id="todayChart"></canvas>
  </div>

  <div class="card">
    <h3>Last 7 Days Trend</h3>
    <canvas id="weeklyChart"></canvas>
  </div>

  </section>

  <footer>
    AWS S3 • Lambda • EventBridge
  </footer>

  <script src="script.js"></script>

</body>
</html>

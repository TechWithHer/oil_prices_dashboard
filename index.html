<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Oil Prices Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🌍 Global Oil Prices Dashboard 2026</h1>
    <p>Live insights • Trends • Predictions</p>
  </header>

  <!-- Rotating Image -->
  <section class="hero">
  <img id="rotatingImage" src="images/oil1.jpg" alt="Oil Visual 1">
  <img id="rotatingImage2" src="images/oil2.jpg" alt="Oil Visual 2">
  <img id="rotatingImage3" src="images/oil3.jpg" alt="Oil Visual 3">
  <img id="rotatingImage4" src="images/oil4.jpg" alt="Oil Visual 4">
</section>

  <!-- Cards Section -->
  <section class="dashboard">

    <!-- CURRENT PRICES -->
    <div class="card">
      <h2>📊 Current Prices</h2>
      <table id="oilTable"></table>
    </div>

    <!-- PAST TRENDS -->
    <div class="card">
      <h2>📈 Past Trends</h2>
      <canvas id="oilChart"></canvas>
      <p class="placeholder">Historical data will appear here</p>
    </div>

    <!-- PREDICTIONS -->
    <div class="card">
      <h2>🔮 Predictions (Next Day)</h2>
      <div id="predictions">
        <p class="placeholder">AI predictions will appear here</p>
      </div>
    </div>

  </section>

  <footer>
    <p>Built with AWS S3 • Lambda • EventBridge • CI/CD</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
